name: Update Glass Badge
on:
  schedule: [{cron: "30 * * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}
jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python scripts/generate_badge.py Cookie-Cat21
      - name: Commit badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-views-badge.svg
          git diff --staged --quiet || git commit -m "Update glass badge [skip ci]"
          git pull --rebase origin main
          git push
